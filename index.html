<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FilmOrbit</title>

<style>
body{margin:0;font-family:Arial;background:#141414;color:#fff}

/* NAVBAR */
.navbar{display:flex;gap:10px;padding:12px;background:#000;align-items:center}
.logo{color:#e50914;font-weight:bold;font-size:22px}

/* SEARCH */
.search-box{position:relative}
.search-box input{padding:10px;border:none;border-radius:4px;width:200px}
.search-results{display:none;position:absolute;background:#222;width:100%;top:100%;z-index:1000;border-radius:4px}
.search-item{padding:10px;cursor:pointer}
.search-item:hover{background:#444}

/* MOVIES */
.results{display:flex;overflow:auto;padding:15px;gap:12px}
.movie{min-width:150px;cursor:pointer}
.movie img{width:100%;border-radius:8px}

/* BANNER */
.banner{height:260px;background-size:cover;display:flex;align-items:end;padding:20px;font-size:24px;font-weight:bold}

/* MODAL */
#modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#0b0b0b;overflow:auto;display:none;padding:20px}

/* CLOSE BTN */
.close-btn{
position:fixed;
top:15px;
right:15px;
background:#e50914;
border:none;
padding:10px 14px;
color:#fff;
cursor:pointer;
border-radius:5px;
z-index:9999;
}

/* DETAILS */
.details-container{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:10px;
}

.poster{
width:150px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.6);
}

.info{
flex:1;
min-width:250px;
}

/* OVERVIEW */
.overview{
line-height:1.7;
color:#ccc;
margin-bottom:15px;
}

/* ANALYTICS */
.analytics{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
}

.analytics div{
background:#1f1f1f;
padding:10px;
border-radius:6px;
}

/* BUTTON */
.trailer-btn{
background:#e50914;
border:none;
padding:12px 20px;
color:#fff;
font-weight:bold;
cursor:pointer;
border-radius:5px;
margin-top:10px;
}

/* TABS */
.tabs{margin-top:20px}
.tabs button{padding:10px;margin:5px;background:#222;border:none;color:#fff;cursor:pointer}
.tabs button.active{color:#e50914}
.tab{display:none}
.tab.active{display:block}

/* SCROLL */
.cast-container,.similar-container,.gallery-container{
display:flex;
overflow:auto;
gap:10px;
}

.cast-card img,.similar-item img,.gallery-container img{
width:120px;
border-radius:6px;
}
</style>
</head>

<body>

<div class="navbar">
<button onclick="goHome()">🏠</button>
<div class="logo">FilmOrbit</div>
<div class="search-box">
<input id="searchInput" placeholder="Search movies...">
<div id="searchResults" class="search-results"></div>
</div>
</div>

<div id="banner" class="banner"></div>

<h2>Trending</h2>
<div id="trending" class="results"></div>

<h2>Popular</h2>
<div id="popular" class="results"></div>

<h2>Top Rated</h2>
<div id="toprated" class="results"></div>

<div id="modal"></div>

<script>
const TMDB_KEY="7aeb28da55dc62f473190b7f88a2acc8";
const OMDB_KEY="72bd5552";
const BASE="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/w500";

/* NETWORK SAFE FETCH */
async function fetchSafe(url){
const proxies=[
url,
"https://corsproxy.io/?"+encodeURIComponent(url),
"https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(url)
];
for(let p of proxies){
try{
const res=await fetch(p);
if(res.ok) return await res.json();
}catch(e){}
}
throw "fail";
}

let trendingMovies=[],bannerIndex=0;

const modal=document.getElementById("modal");
const searchInput=document.getElementById("searchInput");
const searchResults=document.getElementById("searchResults");

function goHome(){
modal.style.display="none";
searchResults.style.display="none";
searchInput.value="";
}

/* SEARCH */
searchInput.addEventListener("input",async function(){
const q=this.value.trim();
if(q.length<2){searchResults.style.display="none";return;}
try{
const d=await fetchSafe(`${BASE}/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}`);
searchResults.innerHTML="";
d.results.slice(0,8).forEach(m=>{
const div=document.createElement("div");
div.className="search-item";
div.textContent=m.title;
div.onclick=()=>fetchDetails(m.id,m.title);
searchResults.appendChild(div);
});
searchResults.style.display="block";
}catch{
searchResults.innerHTML="<div class='search-item'>Network error</div>";
searchResults.style.display="block";
}
});

/* DISPLAY */
function displayMovies(list,id){
const c=document.getElementById(id);
c.innerHTML="";
list.forEach(m=>{
const d=document.createElement("div");
d.className="movie";
d.innerHTML=`<img src="${IMG+m.poster_path}"><p>${m.title}</p>`;
d.onclick=()=>fetchDetails(m.id,m.title);
c.appendChild(d);
});
}

/* BANNER */
function startBanner(){
setInterval(()=>{
const m=trendingMovies[bannerIndex];
banner.style.backgroundImage=`url(${IMG+m.backdrop_path})`;
banner.innerHTML=m.title;
bannerIndex=(bannerIndex+1)%trendingMovies.length;
},5000);
}

/* DETAILS */
async function fetchDetails(id,title){
modal.style.display="block";
modal.innerHTML="<button class='close-btn' onclick='goHome()'>✕</button>Loading...";

try{
const [tmdb,omdb,videos,similar,credits,images]=await Promise.all([
fetchSafe(`${BASE}/movie/${id}?api_key=${TMDB_KEY}`),
fetchSafe(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&t=${encodeURIComponent(title)}`),
fetchSafe(`${BASE}/movie/${id}/videos?api_key=${TMDB_KEY}`),
fetchSafe(`${BASE}/movie/${id}/similar?api_key=${TMDB_KEY}`),
fetchSafe(`${BASE}/movie/${id}/credits?api_key=${TMDB_KEY}`),
fetchSafe(`${BASE}/movie/${id}/images?api_key=${TMDB_KEY}`)
]);

const trailer=videos.results?.find(v=>v.type==="Trailer");

let imdb="N/A",rt="N/A";
if(omdb.Ratings){
imdb=omdb.Ratings.find(r=>r.Source==="Internet Movie Database")?.Value||"N/A";
rt=omdb.Ratings.find(r=>r.Source==="Rotten Tomatoes")?.Value||"N/A";
}

const castHTML=credits.cast?.slice(0,10).map(a=>`
<div class="cast-card">
<img src="${a.profile_path?IMG+a.profile_path:''}">
<p>${a.name}</p>
</div>`).join("");

const similarHTML=similar.results?.slice(0,10).map(m=>`
<div class="similar-item" onclick="fetchDetails(${m.id},'${m.title.replace(/'/g,"")}')">
<img src="${m.poster_path?IMG+m.poster_path:''}">
<p>${m.title}</p>
</div>`).join("");

const galleryHTML=images.backdrops?.slice(0,10).map(i=>`
<img src="https://image.tmdb.org/t/p/w780${i.file_path}">`).join("");

modal.innerHTML=`
<button class="close-btn" onclick="goHome()">✕</button>

<h1>${tmdb.title}</h1>

<div class="details-container">
<img class="poster" src="${IMG+tmdb.poster_path}">

<div class="info">
<p class="overview">${tmdb.overview}</p>

<div class="analytics">
<div>⭐ ${tmdb.vote_average}</div>
<div>🎬 ${imdb}</div>
<div>🍅 ${rt}</div>
<div>💰 $${tmdb.budget.toLocaleString()}</div>
<div>💵 $${tmdb.revenue.toLocaleString()}</div>
<div>📅 ${tmdb.release_date || "N/A"}</div>
</div>

${trailer?`<button class="trailer-btn" onclick="window.open('https://youtube.com/watch?v=${trailer.key}')">▶ Watch Trailer</button>`:""}
</div>
</div>

<div class="tabs">
<button class="tab-btn active" onclick="switchTab('cast',this)">Cast</button>
<button class="tab-btn" onclick="switchTab('similar',this)">Similar</button>
<button class="tab-btn" onclick="switchTab('gallery',this)">Gallery</button>
</div>

<div id="cast" class="tab active"><div class="cast-container">${castHTML}</div></div>
<div id="similar" class="tab"><div class="similar-container">${similarHTML}</div></div>
<div id="gallery" class="tab"><div class="gallery-container">${galleryHTML}</div></div>
`;
}catch{
modal.innerHTML="<button class='close-btn' onclick='goHome()'>✕</button><p>Network blocked</p>";
}
}

/* TABS */
function switchTab(name,btn){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.getElementById(name).classList.add("active");
btn.classList.add("active");
}

/* LOAD */
async function load(){
const d=await fetchSafe(`${BASE}/trending/movie/week?api_key=${TMDB_KEY}`);
trendingMovies=d.results;
displayMovies(d.results,"trending");
startBanner();

displayMovies((await fetchSafe(`${BASE}/movie/popular?api_key=${TMDB_KEY}`)).results,"popular");
displayMovies((await fetchSafe(`${BASE}/movie/top_rated?api_key=${TMDB_KEY}`)).results,"toprated");
}

load();
</script>

</body>
</html>
